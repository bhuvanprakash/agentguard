name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Build binary
        run: CGO_ENABLED=1 go build -o bin/agentguard .

      - name: Binary size
        run: ls -lh bin/agentguard

  python-sdk-test:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          cd sdk/python
          pip install -e ".[dev]"

      - name: Test
        run: |
          cd sdk/python
          pytest tests/ -v

  node-sdk-test:
    name: Node SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: |
          cd sdk/node
          npm install

      - name: Type check
        run: |
          cd sdk/node
          npm run lint

      - name: Test
        run: |
          cd sdk/node
          npm test
