name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          # Linux amd64
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-w -s" \
            -o dist/agentguard-linux-amd64 .

          # Linux arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-w -s" \
            -o dist/agentguard-linux-arm64 .

          # macOS arm64 (Apple Silicon)
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-w -s" \
            -o dist/agentguard-darwin-arm64 .

          # Build CLI binaries
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-w -s" \
            -o dist/agentguard-cli-linux-amd64 ./cmd/cli

          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-w -s" \
            -o dist/agentguard-cli-linux-arm64 ./cmd/cli

          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-w -s" \
            -o dist/agentguard-cli-darwin-arm64 ./cmd/cli

          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files:    dist/*
          generate_release_notes: true
